<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The Archives">
<meta name="theme-color" content="#FBF5EC">
<title>The Archives</title>
<style>
:root{
  --cream:#FBF5EC;--card:#FFFFFF;--sand:#F4EADC;--ink:#31291F;--soft:#8A7F70;--line:#EADFCE;
  --apricot:#F0A46A;--blush:#F1B9C6;--sage:#A9C6A2;--butter:#F5D57A;--peri:#AABFE9;--clay:#C67B5C;
  --disp:'Avenir Next',-apple-system,BlinkMacSystemFont,sans-serif;
  --body:'Avenir Next',-apple-system,BlinkMacSystemFont,sans-serif;
  --safeT:env(safe-area-inset-top,0px);--safeB:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;min-height:100%}
body{background:var(--cream);color:var(--ink);font-family:var(--body);-webkit-text-size-adjust:100%;overscroll-behavior-y:none}
button,input,textarea{font-family:inherit;font-size:16px;color:inherit}
button{background:none;border:none;padding:0;cursor:pointer}
.view{display:none}.view.on{display:block}

.topbar{padding:calc(var(--safeT) + 18px) 20px 6px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--soft);font-weight:600}
.h1{font-family:var(--disp);font-size:32px;line-height:1.02;margin:7px 0 0;font-weight:700;letter-spacing:-.02em}
.round{width:42px;height:42px;border-radius:50%;background:var(--card);display:grid;place-items:center;color:var(--soft);font-size:19px;flex:none;box-shadow:0 2px 8px rgba(120,95,60,.08)}
.round:active{transform:scale(.94)}
.pad{padding:0 20px 130px}

.hero{padding:6px 20px 0;margin-top:-4px}
.hero svg{display:block;width:100%;height:auto}

.shelf{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:14px}
.bookcard{text-align:left}
.cover{aspect-ratio:3/4;border-radius:22px;padding:18px 16px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;box-shadow:0 8px 20px rgba(120,95,60,.13)}
.blob{position:absolute;border-radius:50%;opacity:.9}
.motif{position:absolute;right:-6%;bottom:-4%;width:62%;opacity:.5}
.cover h3{font-size:16px;line-height:1.18;margin:0;font-weight:700;position:relative;letter-spacing:-.01em}
.cover .by{font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.62;position:relative;margin-bottom:5px;font-weight:600}
.ring{position:absolute;top:14px;right:14px}
.cardmeta{font-size:12px;color:var(--soft);margin-top:9px;font-weight:500}

.empty{margin-top:18px;text-align:center;padding:0 8px}
.empty p{font-family:var(--disp);font-size:21px;font-weight:700;margin:18px 0 8px;letter-spacing:-.01em}
.empty span{font-size:14px;color:var(--soft);line-height:1.55}

.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--safeB) + 14px);z-index:44;
  background:rgba(255,255,255,.93);backdrop-filter:blur(20px);border-radius:34px;padding:8px;
  display:flex;align-items:center;gap:6px;box-shadow:0 8px 28px rgba(120,95,60,.18)}
.dock button{padding:11px 20px;border-radius:26px;font-size:13px;font-weight:600;color:var(--soft)}
.dock button.on{background:var(--sand);color:var(--ink)}
.dock .plus{width:48px;height:48px;padding:0;border-radius:50%;background:var(--apricot);color:#fff;font-size:24px;display:grid;place-items:center;box-shadow:0 4px 14px rgba(240,164,106,.45)}
.dock .plus:active{transform:scale(.92)}

.bookhead{display:flex;gap:18px;margin-top:18px}
.bookhead .cover{width:118px;flex:none}
.bookhead h2{font-family:var(--disp);font-size:24px;line-height:1.1;margin:2px 0 8px;font-weight:700;letter-spacing:-.02em}
.meta{font-size:12px;color:var(--soft);font-weight:500}
.bar{height:7px;background:var(--sand);border-radius:7px;overflow:hidden;margin:14px 0 8px}
.bar i{display:block;height:100%;background:var(--apricot);border-radius:7px;transition:width .4s}
.desc{color:#5F564A;font-size:14.5px;line-height:1.65;margin:20px 0 0}
.pill{width:100%;padding:17px;border-radius:20px;background:var(--ink);color:#FFF9EF;font-weight:700;font-size:15px;margin-top:20px;box-shadow:0 5px 16px rgba(49,41,31,.22)}
.pill:active{transform:scale(.985)}
.label{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft);font-weight:700;margin:32px 0 10px}
.chap{display:flex;align-items:center;gap:14px;padding:15px 16px;width:100%;text-align:left;background:var(--card);border-radius:18px;margin-bottom:9px;box-shadow:0 2px 8px rgba(120,95,60,.06)}
.chapno{font-size:12px;color:var(--soft);width:22px;flex:none;font-weight:700}
.chap .t{flex:1;font-size:14.5px;line-height:1.3;font-weight:600}
.chap .t small{display:block;color:var(--soft);font-size:11.5px;margin-top:4px;font-weight:500}
.tick{width:22px;height:22px;border-radius:50%;background:var(--sand);flex:none;display:grid;place-items:center;font-size:11px;color:#fff}
.tick.part{background:var(--butter)}.tick.done{background:var(--sage);color:#2E4229}
.rowbtn{width:100%;text-align:left;padding:16px;background:var(--card);border-radius:18px;margin-bottom:9px;font-size:14.5px;font-weight:600;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(120,95,60,.06)}
.rowbtn span{color:var(--soft);font-size:13px;font-weight:500}
.danger{color:#C4574F}
.ghost{width:100%;padding:15px;border:1.5px dashed var(--line);border-radius:18px;color:var(--soft);font-size:14px;font-weight:600;margin-top:10px;display:block;text-align:center}
.ghost:active{border-color:var(--apricot);color:var(--apricot)}

.field{margin-bottom:18px}
.field label{display:block;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:9px}
.field input,.field textarea{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:15px;color:var(--ink);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--apricot)}
.field textarea{min-height:130px;line-height:1.55;resize:vertical}
.hint{font-size:12.5px;color:var(--soft);line-height:1.55;margin:-8px 0 20px}
.chips{display:flex;gap:9px;flex-wrap:wrap}
.chip{padding:10px 16px;border-radius:20px;background:var(--card);border:1.5px solid var(--line);font-size:13.5px;font-weight:600;color:var(--soft)}
.chip.on{border-color:var(--ink);color:var(--ink);background:var(--sand)}
.tchip{padding:11px 15px;border-radius:14px;font-size:13px;font-weight:700;border:2.5px solid transparent}
.tchip.on{border-color:var(--ink)}
.mchip{width:56px;height:56px;border-radius:16px;background:var(--card);border:2.5px solid var(--line);display:grid;place-items:center;color:var(--soft)}
.mchip.on{border-color:var(--ink);background:var(--sand);color:var(--ink)}
.mchip svg{width:30px;height:30px}

.ringwrap{display:grid;place-items:center;margin:22px 0 6px;position:relative}
.ringwrap .num{position:absolute;text-align:center}
.ringwrap .num b{font-family:var(--disp);font-size:52px;font-weight:700;display:block;line-height:1;letter-spacing:-.03em}
.ringwrap .num span{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);font-weight:700}
.grove{background:var(--card);border-radius:22px;padding:18px 18px 8px;box-shadow:0 2px 8px rgba(120,95,60,.06);margin-top:6px;text-align:center}
.grove p{margin:0 0 4px;font-size:13px;color:var(--soft);font-weight:600}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.statbox{background:var(--card);border-radius:20px;padding:18px;box-shadow:0 2px 8px rgba(120,95,60,.06)}
.statbox b{font-family:var(--disp);font-size:27px;font-weight:700;display:block;letter-spacing:-.02em}
.statbox span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);font-weight:700}
.chart{display:flex;align-items:flex-end;gap:6px;height:92px;margin-top:14px}
.chart div{flex:1;background:var(--sand);border-radius:6px;min-height:5px}
.chart div.act{background:var(--peri)}
.chartx{display:flex;gap:6px;margin-top:8px}
.chartx span{flex:1;text-align:center;font-size:9px;color:var(--soft);font-weight:600}
.note{background:var(--card);border-radius:18px;padding:16px;margin-bottom:11px;box-shadow:0 2px 8px rgba(120,95,60,.06);border-left:4px solid var(--butter)}
.note p{margin:0;font-size:14.5px;line-height:1.6}
.note small{color:var(--soft);font-size:11.5px;display:block;margin-top:10px;font-weight:600}

#reader{position:fixed;inset:0;z-index:60;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
#reader.on{display:block}
.rprog{position:fixed;top:0;left:0;height:3px;z-index:72;background:var(--apricot);width:0;border-radius:0 3px 3px 0;transition:width .12s}
.rpage{max-width:760px;margin:0 auto;padding:calc(var(--safeT) + 78px) 24px calc(var(--safeB) + 200px)}
.rpage h1{font-size:1.5em;line-height:1.25;margin:0 0 1.5em;font-weight:700}
.rpage h2{font-size:1.18em;margin:2em 0 .8em;font-weight:700}
.rpage p{margin:0 0 1.15em;text-wrap:pretty}
.rpage blockquote{margin:1.5em 0;padding-left:1.1em;border-left:2px solid currentColor;opacity:.78;font-style:italic}
.rpage hr{border:none;text-align:center;margin:2.4em 0}
.rpage hr:after{content:"❦";opacity:.35;font-size:.9em}
.rpage mark{background:rgba(245,213,122,.5);color:inherit;border-radius:3px;padding:1px 0}
.rend{margin-top:3.4em;text-align:center;opacity:.85}
.rend svg{width:64px;height:64px;opacity:.3;margin-bottom:10px}
.rend button{padding:14px 28px;border:1.5px solid currentColor;border-radius:26px;font-size:14px;font-weight:600}
.rchrome{position:fixed;left:0;right:0;z-index:69;transition:transform .25s ease,opacity .2s}
.rtop{top:0;padding:calc(var(--safeT) + 10px) 14px 12px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.85);backdrop-filter:blur(18px);color:var(--ink)}
.rbot{bottom:calc(var(--safeB) + 14px);display:flex;justify-content:center}
.rbot .inner{background:rgba(255,255,255,.93);backdrop-filter:blur(20px);border-radius:32px;padding:8px;display:flex;gap:2px;box-shadow:0 8px 28px rgba(60,45,25,.22)}
.rbot .inner button{padding:10px 15px;border-radius:24px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700}
.rbot .inner button b{font-size:16px;font-weight:600;line-height:1;color:var(--ink)}
.rbot .inner button.on{background:var(--sand);color:var(--clay)}
.rbot .inner button.on b{color:var(--clay)}
.rchrome.hide.rtop{transform:translateY(-110%);opacity:0}
.rchrome.hide.rbot{transform:translateY(150%);opacity:0}
.rtitle{flex:1;font-size:13.5px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.rtitle small{display:block;color:var(--soft);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;font-weight:600}
.hlpop{position:fixed;z-index:80;background:var(--ink);color:#FFF6E9;border-radius:22px;padding:10px 18px;font-size:13px;font-weight:700;box-shadow:0 8px 22px rgba(0,0,0,.3);display:none}
.hlpop.on{display:block}

.sheet{position:fixed;left:10px;right:10px;bottom:0;z-index:76;background:rgba(255,255,255,.96);backdrop-filter:blur(24px);
  border-radius:26px 26px 0 0;padding:14px 18px calc(var(--safeB) + 18px);transform:translateY(106%);
  transition:transform .3s cubic-bezier(.32,.8,.32,1);box-shadow:0 -8px 34px rgba(60,45,25,.2);max-height:52vh;overflow-y:auto;color:var(--ink)}
.sheet.on{transform:translateY(0)}
.grab{width:38px;height:5px;border-radius:5px;background:var(--line);margin:0 auto 14px}
.tap{position:fixed;inset:0;z-index:75;display:none}.tap.on{display:block}
.ctl{margin-bottom:15px}
.ctl label{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--soft);font-weight:700;margin-bottom:8px}
.ctl label em{font-style:normal;color:var(--clay)}
input[type=range]{width:100%;accent-color:var(--clay);margin:0}
.seg{display:flex;gap:6px;margin-bottom:14px;background:var(--sand);padding:4px;border-radius:16px}
.seg button{flex:1;padding:9px;border-radius:13px;font-size:12.5px;font-weight:700;color:var(--soft)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(120,95,60,.12)}
.tabpane{display:none}.tabpane.on{display:block}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--safeB) + 100px);background:var(--ink);color:#FFF6E9;padding:13px 22px;border-radius:26px;font-size:13.5px;font-weight:600;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.on{opacity:1}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="view on" id="v-library">
  <div class="topbar">
    <div><div class="eyebrow">Your shelf</div><h1 class="h1">The Archives</h1></div>
    <button class="round" onclick="go('backup')">⋯</button>
  </div>
  <div class="hero" id="hero"></div>
  <div class="pad"><div id="shelf"></div></div>
</div>

<div class="view" id="v-stats">
  <div class="topbar"><div><div class="eyebrow">Reading life</div><h1 class="h1">Stats</h1></div></div>
  <div class="pad" id="statsbody"></div>
</div>

<div class="view" id="v-book">
  <div class="topbar"><button class="round" onclick="go('library')">←</button><button class="round" onclick="editBook()">✎</button></div>
  <div class="pad" id="bookbody"></div>
</div>

<div class="view" id="v-edit">
  <div class="topbar"><button class="round" onclick="cancelEdit()">←</button></div>
  <div class="pad">
    <h1 class="h1" id="edit-h" style="margin-bottom:26px">New book</h1>
    <div class="field"><label>Title</label><input id="f-title" placeholder="King of Nothing Yet"></div>
    <div class="field"><label>Author</label><input id="f-author" placeholder="Bunga"></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="The blurb goes here."></textarea></div>
    <div class="field"><label>Cover colour</label><div class="chips" id="f-pal"></div></div>
    <div class="field"><label>Cover motif</label><div class="chips" id="f-motif"></div></div>
    <div class="field"><label>Reading theme</label><div class="chips" id="f-themes"></div></div>
    <button class="pill" onclick="saveBook()">Save book</button>
    <button class="ghost danger" id="delbook" onclick="deleteBook()" style="display:none">Delete this book</button>
  </div>
</div>

<div class="view" id="v-chap">
  <div class="topbar"><button class="round" onclick="go('book')">←</button></div>
  <div class="pad">
    <h1 class="h1" style="margin-bottom:22px">Add chapter</h1>
    <div class="field"><label>Paste the chapter</label><textarea id="c-md" placeholder="# Chapter 5&#10;&#10;Paste the markdown here..." style="min-height:230px"></textarea></div>
    <p class="hint">The title comes from the first <b>#</b> line. No heading, no problem — it gets numbered.</p>
    <button class="pill" onclick="saveChapter()">Save chapter</button>
    <label class="ghost">Or upload .md files (several at once)
      <input type="file" accept=".md,.markdown,.txt" multiple onchange="importMd(this)" style="display:none"></label>
  </div>
</div>

<div class="view" id="v-hl">
  <div class="topbar"><button class="round" onclick="go('book')">←</button></div>
  <div class="pad"><h1 class="h1" style="margin-bottom:26px">Highlights</h1><div id="hlbody"></div></div>
</div>

<div class="view" id="v-backup">
  <div class="topbar"><button class="round" onclick="go('library')">←</button></div>
  <div class="pad">
    <h1 class="h1" style="margin-bottom:20px">Backup</h1>
    <p class="hint" style="margin-top:0">Everything lives on this phone only. Save a backup to Files or Drive now and then.</p>
    <button class="pill" onclick="exportData()">Download backup</button>
    <label class="ghost">Restore from a backup
      <input type="file" accept=".json" onchange="importData(this)" style="display:none"></label>
    <p class="hint" style="margin-top:26px" id="usage"></p>
  </div>
</div>

<div class="dock" id="dock">
  <button data-tab="library" class="on" onclick="go('library')">Shelf</button>
  <button class="plus" onclick="fabAction()">+</button>
  <button data-tab="stats" onclick="go('stats')">Stats</button>
</div>

<div class="rprog" id="rprog"></div>
<div id="reader"><div class="rpage" id="rpage"></div></div>
<div class="rchrome rtop hide" id="rtop">
  <button class="round" onclick="closeReader()">←</button><div class="rtitle" id="rtitle"></div>
</div>
<div class="rchrome rbot hide" id="rbot"><div class="inner">
  <button id="btn-auto" onclick="toggleAuto()"><b>▶</b>Auto</button>
  <button onclick="openSheet()"><b>Aa</b>Look</button>
  <button onclick="prevChap()"><b>‹</b>Prev</button>
  <button onclick="nextChap()"><b>›</b>Next</button>
</div></div>
<button class="hlpop" id="hlpop" onclick="addHighlight()">Highlight</button>

<div class="tap" id="tap" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="seg">
    <button class="on" data-p="type" onclick="pane('type')">Type</button>
    <button data-p="theme" onclick="pane('theme')">Theme</button>
    <button data-p="scroll" onclick="pane('scroll')">Scroll</button>
  </div>
  <div class="tabpane on" id="p-type">
    <div class="ctl"><label>Text size <em id="l-size"></em></label><input type="range" id="s-size" min="14" max="30" step="1"></div>
    <div class="ctl"><label>Line spacing <em id="l-lh"></em></label><input type="range" id="s-lh" min="13" max="24" step="1"></div>
    <div class="ctl"><label>Margins <em id="l-mg"></em></label><input type="range" id="s-mg" min="10" max="60" step="2"></div>
    <div class="ctl"><label>Typeface</label><div class="chips" id="s-font"></div></div>
  </div>
  <div class="tabpane" id="p-theme"><div class="ctl"><label>Theme for this book</label><div class="chips" id="s-theme"></div></div></div>
  <div class="tabpane" id="p-scroll">
    <div class="ctl"><label>Auto-scroll speed <em id="l-sp"></em></label><input type="range" id="s-sp" min="6" max="120" step="2"></div>
    <p class="hint" style="margin:0">Touching the page pauses it.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=i=>document.getElementById(i);

/* ---------- illustration set ---------- */
const MOTIF={
  tree:`<path d="M22 30v10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="16" r="9"/><circle cx="14" cy="23" r="7.5"/><circle cx="30" cy="23" r="7.5"/>`,
  cottage:`<path d="M8 24 22 12l14 12v16H8z"/><rect x="18" y="30" width="8" height="10" rx="1.5" fill="rgba(255,255,255,.55)"/>
    <rect x="28" y="10" width="4.5" height="9" rx="1.5"/>`,
  books:`<rect x="8" y="30" width="28" height="7" rx="2"/><rect x="10" y="21" width="24" height="7" rx="2"/>
    <rect x="13" y="12" width="19" height="7" rx="2"/>`,
  moon:`<path d="M30 8a16 16 0 1 0 8 26A17 17 0 0 1 30 8z"/><circle cx="34" cy="12" r="2"/><circle cx="12" cy="14" r="1.6"/>`,
  mountain:`<path d="M4 38 18 14l9 14 5-7 8 17z"/><path d="M14 24h8l-4-7z" fill="rgba(255,255,255,.55)"/>`,
  flower:`<circle cx="22" cy="12" r="6"/><circle cx="32" cy="20" r="6"/><circle cx="28" cy="31" r="6"/>
    <circle cx="16" cy="31" r="6"/><circle cx="12" cy="20" r="6"/><circle cx="22" cy="22" r="4.5" fill="rgba(255,255,255,.6)"/>`,
  lantern:`<rect x="13" y="14" width="18" height="22" rx="6"/><path d="M22 6v8" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="18" y="21" width="8" height="9" rx="3" fill="rgba(255,255,255,.6)"/>`,
  wave:`<path d="M4 26c6-8 12-8 18 0s12 8 18 0" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M4 36c6-8 12-8 18 0s12 8 18 0" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" opacity=".55"/>`
};
const svg=(k,cls)=>`<svg class="${cls||""}" viewBox="0 0 44 44" fill="currentColor">${MOTIF[k]||MOTIF.tree}</svg>`;

/* ---------- data ---------- */
const THEMES={
  ao3:{name:"AO3",bg:"#FFFFFF",fg:"#2A2A2A",font:"Verdana,'Lucida Grande',Helvetica,sans-serif",tex:"none",lh:15,size:16},
  paper:{name:"Paper",bg:"#F7F2E6",fg:"#2C2822",font:"'Iowan Old Style',Charter,Georgia,serif",tex:"none"},

const KEY="archives:v1";
const hasWS=typeof window.storage!=="undefined"&&window.storage;
async function rawGet(){if(hasWS){try{const r=await window.storage.get(KEY);return r?r.value:null}catch(e){return null}}try{return localStorage.getItem(KEY)}catch(e){return null}}
async function rawSet(v){if(hasWS){try{await window.storage.set(KEY,v)}catch(e){}return}try{localStorage.setItem(KEY,v)}catch(e){toast("Storage full. Download a backup, then delete an old book.")}}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().slice(0,10)}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function inline(s){return esc(s)
  .replace(/\*\*\*(.+?)\*\*\*/g,"<strong><em>$1</em></strong>")
  .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
  .replace(/(^|[\s(])\*(?!\s)(.+?)(?<!\s)\*/g,"$1<em>$2</em>")
  .replace(/(^|[\s(])_(?!\s)(.+?)(?<!\s)_/g,"$1<em>$2</em>")}
function md2html(md){
  const out=[];
  for(let b of md.replace(/\r/g,"").split(/\n{2,}/)){
    b=b.trim();if(!b)continue;
    if(/^([*\-_]\s*){3,}$/.test(b)){out.push("<hr>");continue}
    if(/^#\s/.test(b)){out.push("<h1>"+inline(b.slice(2))+"</h1>");continue}
    if(/^##+\s/.test(b)){out.push("<h2>"+inline(b.replace(/^#+\s/,""))+"</h2>");continue}
    if(/^>\s?/.test(b)){out.push("<blockquote>"+inline(b.replace(/^>\s?/gm,""))+"</blockquote>");continue}
    out.push("<p>"+inline(b).replace(/\n/g,"<br>")+"</p>");
  }
  return out.join("");
}
function titleOf(md,i){const m=md.match(/^#\s+(.+)$/m);return m?m[1].trim():"Chapter "+(i+1)}
function countWords(md){const t=md.replace(/[#>*_`]/g," ").trim();return t?t.split(/\s+/).length:0}

let curBook=null,curChap=null,editing=null;

/* ---------- book ---------- */
function openBook(id){curBook=DB.books.find(b=>b.id===id);go("book")}
function renderBook(){
  const b=curBook;if(!b)return go("library");
  const p=prog(b),words=b.chapters.reduce((s,c)=>s+c.words,0);
  const hls=DB.highlights.filter(h=>h.bookId===b.id).length;
  const next=b.chapters.find(c=>!c.done)||b.chapters[0];
  $("bookbody").innerHTML=`
    <div class="bookhead">${coverHTML(b,false)}
      <div style="flex:1;min-width:0">
        <h2>${esc(b.title)}</h2>
        <div class="meta">${b.chapters.length} chapters · ${words.toLocaleString("en")} words</div>
        <div class="bar"><i style="width:${p*100}%"></i></div>
        <div class="meta">${Math.round(p*100)}% read</div>
      </div></div>
    ${b.desc?`<p class="desc">${esc(b.desc)}</p>`:""}
    ${next?`<button class="pill" onclick="openChap('${next.id}')">${p>0?"Continue":"Start reading"} · ${esc(next.title)}</button>`:""}
    <div class="label">Chapters</div>
    ${b.chapters.length?b.chapters.map((c,i)=>`<button class="chap" onclick="openChap('${c.id}')">
      <span class="chapno">${String(i+1).padStart(2,"0")}</span>
      <span class="t">${esc(c.title)}<small>${c.words.toLocaleString("en")} words · ${Math.max(1,Math.round(c.words/220))} min</small></span>
      <span class="tick ${c.done?"done":(c.scroll>.02?"part":"")}">${c.done?"✓":""}</span></button>`).join("")
      :`<p class="hint">No chapters yet. Tap + below.</p>`}
    <div class="label">More</div>
    <button class="rowbtn" onclick="go('hl')">Highlights &amp; notes <span>${hls}</span></button>
    <button class="rowbtn" onclick="editBook()">Edit book details <span>›</span></button>`;
}

function newBook(){editing=null;fillForm({title:"",author:"Bunga",desc:"",theme:"paper",pal:"apricot",motif:"tree"});
  $("edit-h").textContent="New book";$("delbook").style.display="none";go("edit")}
function editBook(){editing=curBook;fillForm(curBook);
  $("edit-h").textContent="Edit book";$("delbook").style.display="block";go("edit")}
function fillForm(b){
  $("f-title").value=b.title||"";$("f-author").value=b.author||"";$("f-desc").value=b.desc||"";
  $("f-pal").innerHTML=Object.entries(PALETTES).map(([k,p])=>
    `<button class="tchip ${(b.pal||"apricot")===k?"on":""}" data-k="${k}" style="background:${p[0]};color:${p[3]}" onclick="pick('f-pal','${k}')">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p[1]};margin-right:6px;vertical-align:-1px"></span>${k}</button>`).join("");
  $("f-motif").innerHTML=Object.keys(MOTIF).map(k=>
    `<button class="mchip ${(b.motif||"tree")===k?"on":""}" data-k="${k}" onclick="pick('f-motif','${k}')">${svg(k)}</button>`).join("");
  $("f-themes").innerHTML=Object.entries(THEMES).map(([k,t])=>
    `<button class="tchip ${b.theme===k?"on":""}" data-k="${k}" style="background:${t.bg};color:${t.fg};font-family:${t.font}" onclick="pick('f-themes','${k}')">${t.name}</button>`).join("");

function pick(box,k){document.querySelectorAll("#"+box+" [data-k]").forEach(c=>c.classList.toggle("on",c.dataset.k===k))}
function sel(box){const e=document.querySelector("#"+box+" .on");return e?e.dataset.k:null}
function saveBook(){
  const title=$("f-title").value.trim();if(!title)return toast("Give it a title first.");
  const d={title,author:$("f-author").value.trim(),desc:$("f-desc").value.trim(),
    theme:sel("f-themes")||"paper",pal:sel("f-pal")||"apricot",motif:sel("f-motif")||"tree"};
  if(editing){Object.assign(editing,d);curBook=editing}
  else{const b={id:uid(),...d,chapters:[],created:Date.now()};DB.books.unshift(b);curBook=b}
  save();toast("Saved.");go("book");
}
function cancelEdit(){go(editing?"book":"library")}
function deleteBook(){
  if(!confirm("Delete \""+curBook.title+"\" and all its chapters? This can't be undone."))return;
  DB.books=DB.books.filter(b=>b.id!==curBook.id);
  DB.highlights=DB.highlights.filter(h=>h.bookId!==curBook.id);
  curBook=null;save();go("library");
}

function saveChapter(){
  const md=$("c-md").value.trim();if(!md)return toast("Nothing to save.");
  addChapter(md);$("c-md").value="";toast("Chapter added.");go("book");
}
function addChapter(md,name){
  const i=curBook.chapters.length;let title=titleOf(md,i);
  if(!/^#\s/m.test(md)&&name)title=name.replace(/\.(md|markdown|txt)$/i,"").replace(/[-_]/g," ");
  curBook.chapters.push({id:uid(),title,md,words:countWords(md),scroll:0,done:false,added:Date.now()});save();
}
function importMd(input){
  const files=[...input.files].sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true}));
  let n=0;
  files.forEach(f=>{const r=new FileReader();
    r.onload=()=>{addChapter(r.result,f.name);if(++n===files.length){toast(n+" chapters added.");go("book")}};
    r.readAsText(f)});
  input.value="";
}

/* ---------- reader ---------- */
function applyTheme(){
  const t=THEMES[curBook.theme]||THEMES.paper,S=DB.settings,R=$("reader"),P=$("rpage");
  R.style.background=t.bg;R.style.backgroundImage=t.tex;R.style.backgroundAttachment="fixed";R.style.color=t.fg;
  P.style.textAlign=t.align||"left";
  document.querySelector("meta[name=theme-color]").setAttribute("content",t.bg);
  P.style.fontFamily=S.font;P.style.fontSize=S.size+"px";P.style.lineHeight=S.lh/10;
  P.style.paddingLeft=S.mg+"px";P.style.paddingRight=S.mg+"px";
}
function openChap(id){
  curChap=curBook.chapters.find(c=>c.id===id);if(!curChap)return;
  $("rpage").innerHTML=md2html(curChap.md)+`<div class="rend">${svg(curBook.motif||"tree")}
    <p style="opacity:.55;font-size:.85em;margin:0 0 1.4em">End of chapter</p>
    <button onclick="nextChap()">Next chapter ›</button></div>`;
  applyTheme();paintHighlights();
  $("rtitle").innerHTML=esc(curChap.title)+"<small>"+esc(curBook.title)+"</small>";
  const R=$("reader");R.classList.add("on");document.body.style.overflow="hidden";
  requestAnimationFrame(()=>{R.scrollTop=(curChap.scroll||0)*Math.max(1,R.scrollHeight-R.clientHeight);updProg()});
  showChrome(true);setTimeout(()=>{if(!$("sheet").classList.contains("on"))showChrome(false)},2400);
  startTimer();
}
function closeReader(){
  stopAuto();stopTimer();closeSheet();
  $("reader").classList.remove("on");document.body.style.overflow="";$("rprog").style.width="0";
  document.querySelector("meta[name=theme-color]").setAttribute("content","#FBF5EC");
  renderBook();go("book");
}
function updProg(){
  const R=$("reader"),max=Math.max(1,R.scrollHeight-R.clientHeight),p=Math.min(1,R.scrollTop/max);
  $("rprog").style.width=p*100+"%";
  if(curChap){curChap.scroll=p;if(p>.97&&!curChap.done){curChap.done=true;toast("Chapter finished ✓");bank(curChap.words)}save()}
}
$("reader").addEventListener("scroll",updProg,{passive:true});
$("reader").addEventListener("click",e=>{
  if(e.target.closest("button"))return;
  if(window.getSelection().toString().length)return;
  if($("sheet").classList.contains("on"))return;
  showChrome(!chromeOn);
});
function showChrome(on){chromeOn=on;$("rtop").classList.toggle("hide",!on);$("rbot").classList.toggle("hide",!on)}
function nextChap(){const i=curBook.chapters.findIndex(c=>c.id===curChap.id);
  if(i<curBook.chapters.length-1){stopAuto();openChap(curBook.chapters[i+1].id)}else{toast("That's the last chapter.");closeReader()}}
function prevChap(){const i=curBook.chapters.findIndex(c=>c.id===curChap.id);
  if(i>0){stopAuto();openChap(curBook.chapters[i-1].id)}else toast("This is the first chapter.")}

function toggleAuto(){auto?stopAuto():startAuto()}
function startAuto(){
  auto=true;lastT=performance.now();acc=0;
  const btn=$("btn-auto");btn.classList.add("on");btn.querySelector("b").textContent="❚❚";
  const R=$("reader");
  const step=t=>{if(!auto)return;
    const dt=(t-lastT)/1000;lastT=t;acc+=DB.settings.sp*dt;
    if(acc>=1){R.scrollTop+=Math.floor(acc);acc-=Math.floor(acc)}
    if(R.scrollTop>=R.scrollHeight-R.clientHeight-2){stopAuto();return}
    autoRAF=requestAnimationFrame(step)};
  autoRAF=requestAnimationFrame(step);
}
function stopAuto(){auto=false;cancelAnimationFrame(autoRAF);
  const btn=$("btn-auto");btn.classList.remove("on");btn.querySelector("b").textContent="▶"}
$("reader").addEventListener("touchstart",()=>{if(auto)stopAuto()},{passive:true});

function startTimer(){stopTimer();timeTick=setInterval(()=>{if(document.hidden)return;secBank+=10;
  if(secBank>=60){addMinutes(Math.floor(secBank/60));secBank%=60}},10000)}
function stopTimer(){clearInterval(timeTick);timeTick=null}
function addMinutes(m){const d=today();DB.days[d]=DB.days[d]||{min:0,words:0};DB.days[d].min+=m;save()}
function bank(w){const d=today();DB.days[d]=DB.days[d]||{min:0,words:0};DB.days[d].words+=w;save()}

let pendingSel=null;
document.addEventListener("selectionchange",()=>{
  if(!$("reader").classList.contains("on"))return;
  const s=window.getSelection(),pop=$("hlpop"),txt=s?s.toString().trim():"";
  if(txt.length>4&&s.rangeCount){
    const r=s.getRangeAt(0).getBoundingClientRect();
    pop.style.left=Math.min(innerWidth-110,Math.max(12,r.left+r.width/2-48))+"px";
    pop.style.top=Math.max(70,r.top-54)+"px";pop.classList.add("on");pendingSel=txt;
  }else{pop.classList.remove("on");pendingSel=null}
});
function addHighlight(){
  if(!pendingSel)return;
  DB.highlights.unshift({id:uid(),bookId:curBook.id,chapId:curChap.id,chapTitle:curChap.title,text:pendingSel,note:"",at:Date.now()});
  save();getSelection().removeAllRanges();$("hlpop").classList.remove("on");paintHighlights();toast("Highlighted.");
}
function paintHighlights(){
  const hs=DB.highlights.filter(h=>h.chapId===curChap.id);if(!hs.length)return;
  const root=$("rpage");
  hs.forEach(h=>{
    const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);let n;
    while((n=w.nextNode())){
      if(n.parentElement.tagName==="MARK")continue;
      const i=n.nodeValue.indexOf(h.text);
      if(i>-1){const r=document.createRange();r.setStart(n,i);r.setEnd(n,i+h.text.length);
        const m=document.createElement("mark");try{r.surroundContents(m)}catch(e){}break}
    }});
}
function renderHL(){
  const hs=DB.highlights.filter(h=>h.bookId===curBook.id);
  $("hlbody").innerHTML=hs.length?hs.map(h=>`<div class="note"><p>${esc(h.text)}</p>
    ${h.note?`<p style="font-size:13.5px;color:var(--soft);margin-top:10px">${esc(h.note)}</p>`:""}
    <small>${esc(h.chapTitle)} · <button style="color:var(--clay);font-weight:700" onclick="noteHL('${h.id}')">note</button>
    · <button class="danger" style="font-weight:700" onclick="delHL('${h.id}')">delete</button></small></div>`).join("")
    :`<p class="hint">Nothing yet. While reading, press and hold a passage, then tap Highlight.</p>`;
}
function noteHL(id){const h=DB.highlights.find(x=>x.id===id);const n=prompt("Note:",h.note||"");if(n!==null){h.note=n;save();renderHL()}}
function delHL(id){DB.highlights=DB.highlights.filter(h=>h.id!==id);save();renderHL()}

}
["size","lh","mg","sp"].forEach(k=>$("s-"+k)
  .addEventListener("input",e=>{DB.settings[k]=+e.target.value;save();labels();applyTheme()}));

/* ---------- stats ---------- */
function renderStats(){
  const has=k=>DB.days[k]&&(DB.days[k].min>0||DB.days[k].words>0);
  let streak=0;const d=new Date();
  if(!has(today()))d.setDate(d.getDate()-1);
  for(;;){const k=d.toISOString().slice(0,10);if(!has(k))break;streak++;d.setDate(d.getDate()-1)}
  const ks=Object.keys(DB.days);
  const totMin=ks.reduce((s,k)=>s+(DB.days[k].min||0),0);
  const totW=ks.reduce((s,k)=>s+(DB.days[k].words||0),0);
  const chaps=DB.books.reduce((s,b)=>s+b.chapters.filter(c=>c.done).length,0);
  const done=DB.books.filter(b=>b.chapters.length&&prog(b)===1).length;
  const cols=["#F0A46A","#EFA3B5","#9FC098","#F0CB63","#9FB6E5","#C67B5C","#B79FD6"];
  const w7=[...Array(7)].map((_,i)=>{const x=new Date();x.setDate(x.getDate()-(6-i));return has(x.toISOString().slice(0,10))});
  const R=52,C=2*Math.PI*R,seg=C/7-8;
  const arcs=w7.map((on,i)=>`<circle cx="64" cy="64" r="${R}" fill="none" stroke="${on?cols[i]:"#EFE6D8"}"
    stroke-width="11" stroke-linecap="round" stroke-dasharray="${seg} ${C-seg}" stroke-dashoffset="${-i*(C/7)}"
    transform="rotate(-90 64 64)"/>`).join("");
  const leaves=[[60,34,20],[38,50,15],[82,50,15],[47,26,12],[75,26,12],[60,58,13],[30,34,10]];
  const grown=Math.min(7,streak);
  const tree=`<svg viewBox="0 0 120 108" width="150" height="135">
    <rect x="55" y="62" width="10" height="38" rx="5" fill="#C09A72"/>
    <path d="M60 78 42 66M60 72 78 60" stroke="#C09A72" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M18 100h84" stroke="#EADFCE" stroke-width="4" stroke-linecap="round"/>
    ${leaves.map((l,i)=>`<circle cx="${l[0]}" cy="${l[1]}" r="${l[2]}" fill="${i<grown?cols[i]:"#F1EADF"}"/>`).join("")}
  </svg>`;
  const l14=[...Array(14)].map((_,i)=>{const x=new Date();x.setDate(x.getDate()-(13-i));
    const k=x.toISOString().slice(0,10);
    return{m:(DB.days[k]&&DB.days[k].min)||0,lab:["S","M","T","W","T","F","S"][x.getDay()]}});
  const mx=Math.max(10,...l14.map(x=>x.m));
  $("statsbody").innerHTML=`
    <div class="ringwrap"><svg width="128" height="128" viewBox="0 0 128 128">${arcs}</svg>
      <div class="num"><b>${streak}</b><span>day streak</span></div></div>
    <div class="grove">${tree}<p>${grown===0?"Your tree is bare. Read something."
      :grown<7?"It fills in a little for every day you read.":"Full canopy. Nice week."}</p></div>
    <div class="label">Last 14 days · minutes</div>
    <div class="chart">${l14.map(x=>`<div class="${x.m?"act":""}" style="height:${Math.max(5,x.m/mx*92)}px"></div>`).join("")}</div>
    <div class="chartx">${l14.map(x=>`<span>${x.lab}</span>`).join("")}</div>
    <div class="statgrid">
      <div class="statbox"><b>${Math.round(totMin/60*10)/10}</b><span>hours read</span></div>
      <div class="statbox"><b>${totW.toLocaleString("en")}</b><span>words read</span></div>
      <div class="statbox"><b>${chaps}</b><span>chapters done</span></div>
      <div class="statbox"><b>${done}</b><span>books finished</span></div></div>
    <div class="label">Recent highlights</div>
    ${DB.highlights.slice(0,4).map(h=>`<div class="note"><p>${esc(h.text)}</p><small>${esc(h.chapTitle)}</small></div>`).join("")
      ||`<p class="hint">None yet.</p>`}`;
}

/* ---------- backup ---------- */
function exportData(){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(DB)],{type:"application/json"}));
  a.download="archives-backup-"+today()+".json";document.body.appendChild(a);a.click();a.remove();
  toast("Backup downloaded.");
}
function importData(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.books)throw 0;
    if(!confirm("Replace everything currently in the app with this backup?"))return;
    DB=Object.assign({books:[],highlights:[],days:{},settings:DB.settings},d);save();toast("Restored.");go("library")}
    catch(e){toast("Couldn't read that file.")}};
  r.readAsText(f);input.value="";
}
function renderUsage(){
  const kb=Math.round(JSON.stringify(DB).length/1024);
  const w=DB.books.reduce((s,b)=>s+b.chapters.reduce((x,c)=>x+c.words,0),0);
  $("usage").textContent=`${DB.books.length} books · ${w.toLocaleString("en")} words stored · about ${kb} KB used.`;
}

(async function(){
  const raw=await rawGet();
  if(raw){try{DB=Object.assign(DB,JSON.parse(raw))}catch(e){}}
  DB.settings=Object.assign({size:18,lh:17,mg:24,sp:34,font:FONTS[0][1]},DB.settings||{});
  if(!FONTS.some(f=>f[1]===DB.settings.font))DB.settings.font=FONTS[0][1];
  DB.books.forEach(b=>{b.chapters=b.chapters||[];b.pal=b.pal||"apricot";b.motif=b.motif||"tree"});
  go("library");
})();
</script>
</body>
</html>
